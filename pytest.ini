[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

addopts =
    -v
    -ra
    --tb=short
    --strict-markers
    --ignore=tests/performance/test_browser_lean_footprint.py

markers =
    unit:        Быстрые изолированные тесты без I/O (файлы, сеть)
    integration: Тесты взаимодействия модулей с реальным I/O
    performance: Тесты производительности и потребления памяти
    stress:      Нагрузочные тесты (долгие, запускать отдельно)
    e2e:         Сквозные тесты с реальным браузером и сетью

log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:playwright
    ignore::PendingDeprecationWarning
    ignore:Proactor event loop does not implement add_reader:UserWarning
    ignore:.*unclosed transport.*:ResourceWarning
    ignore:.*Exception ignored in.*:pytest.PytestUnraisableExceptionWarning