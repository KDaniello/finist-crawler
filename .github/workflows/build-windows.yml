name: Build Windows EXE

on:
  push:
    tags:
      - "v*.*.*"   # Триггер: git tag v0.1.0 && git push origin v0.1.0

jobs:
  build-exe:
    name: Build FinistCrawler.exe
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Camoufox browser
        run: python -m camoufox fetch
        # Camoufox скачивает Firefox бинарник (~60 MB)
        # Он попадёт в site-packages/camoufox/ и будет подхвачен PyInstaller

      - name: Download fonts
        run: python scripts/download_fonts.py

      - name: Generate icon
        run: python scripts/generate_icon.py

      - name: Build EXE
        run: pyinstaller finist.spec

      - name: Verify EXE exists
        run: |
          if (!(Test-Path "dist\FinistCrawler.exe")) {
            Write-Error "FinistCrawler.exe не найден в dist/"
            exit 1
          }
          $size = (Get-Item "dist\FinistCrawler.exe").length / 1MB
          Write-Host "Размер: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinistCrawler-windows-${{ github.ref_name }}
          path: dist/FinistCrawler.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Finist Crawler ${{ github.ref_name }}"
          body: |
            ## Finist Crawler ${{ github.ref_name }}

            ### Установка
            1. Скачайте `FinistCrawler.exe`
            2. Запустите — установка не требуется
            3. При первом запуске Windows может показать предупреждение SmartScreen — нажмите «Подробнее» → «Запустить»

            ### Что нового
            См. [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ### Системные требования
            - Windows 10 / 11 (x64)
            - ~500 MB свободного места
            - Интернет-соединение
          files: dist/FinistCrawler.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}